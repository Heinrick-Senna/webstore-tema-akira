<section class="blog-page-container">
  <div class="container">
    <span class="breadcrumb-container" data-wsjs-breadcrumb></span>
  </div>

  <div class="container blog-list-holder" data-wsjs-blog="list-holder">
    <div class="blog-list-title">
      <h1>Artigos</h1>
    </div>

    <ul data-wsjs-blog="list">

    </ul>

    <ul data-wsjs-blog="pagination" class="blog-pagination-list">

    </ul>

  </div>

  <div class="container blog-article-holder" data-wsjs-blog="article-holder">
    <div class="blog-article-title">
      <h1 data-wsjs-blog="article-titulo"></h1>
    </div>

    <div class="blog-article-subtitle-holder">
      <div class="blog-article-subtitle" data-wsjs-blog="article-subtitulo"></div>

      <div class="blog-article-date">
        <span>Publicado em:</span>
        <div data-wsjs-blog="article-data"></div>
      </div>
    </div>

    <div class="blog-article-image-holder" data-wsjs-blog="article-foto">
    </div>

    <div class="blog-article-content-holder">
      <div data-wsjs-blog="article-conteudo">
      </div>
    </div>


    <div class="blog-article-exit-holder">
      <a data-wsjs-blog="exitButton">Voltar</a>
    </div>

  </div>
</section>
